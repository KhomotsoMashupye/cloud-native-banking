# Accounts Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: accounts-service
  template:
    metadata:
      labels:
        app: accounts-service
    spec:
      containers:
        - name: accounts
          image: 167217327829.dkr.ecr.af-south-1.amazonaws.com/accounts:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          
          
