name: Microservices CI/CD  EKS

on:
  push:
    branches: [dev,main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: af-south-1
  ECR_ACCOUNT: "167217327829"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      #  Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      #  Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build & push Docker images for all microservices
      - name: Build and push Docker images
        run: |
          SERVICES=("accounts" "authorization" "notifications" "transactions")
          for SERVICE in "${SERVICES[@]}"; do
            IMAGE_TAG=$(date +%Y%m%d%H%M%S)
            IMAGE_URI=$ECR_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE:$IMAGE_TAG

            echo "Building $SERVICE..."
            docker build -t $IMAGE_URI ./$SERVICE

            echo "Pushing $SERVICE to ECR..."
            docker push $IMAGE_URI

            # Export for later steps
            echo "IMAGE_URI_${SERVICE}=$IMAGE_URI" >> $GITHUB_ENV
          done

      # Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      # Configure kubeconfig for EKS
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name eks-banking-cluster


         # Apply Kubernetes manifests
      - name: Apply Kubernetes manifests
        run: |
          echo "Applying manifests for all microservices..."
          MANIFEST_DIRS=("accounts" "authorization" "notifications" "transactions")
          for DIR in "${MANIFEST_DIRS[@]}"; do
            if [ -d "./$DIR" ]; then
              kubectl apply -f ./$DIR -n default
              kubectl rollout status deployment/$DIR --timeout=5m || exit 1
            else
              echo "Directory ./$DIR does not exist, skipping..."
            fi
          done

      #  Deploy all microservices
      - name: Deploy microservices
        run: |
          DEPLOYMENTS=("accounts" "authorization" "notifications" "transactions")
          
          for DEPLOYMENT in "${DEPLOYMENTS[@]}"; do
            IMAGE_VAR="IMAGE_URI_${DEPLOYMENT}"
            IMAGE_URI="${!IMAGE_VAR}"

            echo "Deploying $DEPLOYMENT using image $IMAGE_URI..."
            kubectl set image deployment/$DEPLOYMENT $DEPLOYMENT=$IMAGE_URI -n default

            
            kubectl rollout status deployment/$DEPLOYMENT --timeout=5m || exit 1
          done