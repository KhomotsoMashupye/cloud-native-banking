name: Accounts CI/CD 

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read 

env:
  AWS_REGION: af-south-1
  ECR_ACCOUNT: "167217327829"

jobs:
  build-and-deploy-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      #  Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      #  Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      #  Login to Amazon ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      #  Build & push Docker image for accounts only
      - name: Build and push accounts Docker image
        run: |
          SERVICE="accounts"
          IMAGE_TAG=$(date +%Y%m%d%H%M%S)
          IMAGE_URI=$ECR_ACCOUNT.dkr.ecr.$AWS_REGION.amazonaws.com/$SERVICE:$IMAGE_TAG

          echo "Building $SERVICE..."
          docker build -t $IMAGE_URI ./applications

          echo "Pushing $SERVICE to ECR..."
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      # Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      # 6 Configure kubeconfig for EKS
      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name eks-banking-cluster

      #  Deploy accounts microservice
      - name: Deploy accounts microservice
        run: |
          DEPLOYMENT="accounts"
          IMAGE_URI="${IMAGE_URI}"

          echo "Deploying $DEPLOYMENT using image $IMAGE_URI..."
          kubectl set image deployment/$DEPLOYMENT $DEPLOYMENT=$IMAGE_URI -n default

          kubectl rollout status deployment/$DEPLOYMENT --timeout=5m || exit 1